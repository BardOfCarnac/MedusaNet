<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NCN 2077 Vision Mockup</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at center, rgba(180, 40, 255, .12), transparent 35%),
      linear-gradient(120deg, #050612, #02030a 65%, #090014);
    color: #f5eaff;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  .vision {
    position: relative;
    width: 100vw;
    height: 100vh;
    perspective: 900px;
    transform-style: preserve-3d;
  }

  .vision::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,.45) 100%);
    box-shadow: inset 0 0 90px rgba(220, 60, 255, .18);
  }

  .world {
    position: absolute;
    inset: -10%;
    background:
      linear-gradient(90deg, transparent 0 10%, rgba(0,255,255,.08) 10.2%, transparent 10.5%),
      linear-gradient(rgba(255,255,255,.08), rgba(255,255,255,.02));
    filter: blur(2px);
    opacity: .25;
    transform: translateZ(-500px) scale(1.4);
  }

  .ui {
    position: absolute;
    inset: 0;
    transform-style: preserve-3d;
    transition: transform .15s ease-out;
  }

  .panel {
    position: absolute;
    padding: 18px;
    border: 1px solid rgba(234, 64, 255, .55);
    border-radius: 18px;
    background: rgba(12, 6, 30, .42);
    box-shadow:
      0 0 22px rgba(210, 55, 255, .35),
      inset 0 0 24px rgba(0, 220, 255, .08);
    backdrop-filter: blur(8px);
  }

  h1, h2, p { margin: 0; }

  .main {
    width: 440px;
    left: 50%;
    top: 28%;
    transform: translate(-50%, -50%) translateZ(120px);
  }

  .left {
    width: 220px;
    left: 8%;
    top: 42%;
    transform: rotateY(28deg) translateZ(-40px);
    opacity: .72;
  }

  .right {
    width: 240px;
    right: 7%;
    top: 35%;
    transform: rotateY(-30deg) translateZ(-60px);
    opacity: .72;
  }

  .bottom {
    width: 520px;
    left: 50%;
    bottom: 8%;
    transform: translateX(-50%) rotateX(18deg) translateZ(-80px);
    opacity: .82;
  }

  .tag {
    color: #ff45e6;
    font-size: .75rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  h1 {
    font-size: 2.1rem;
    line-height: .95;
    text-transform: uppercase;
  }

  h2 {
    font-size: 1rem;
    color: #7df9ff;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  p {
    margin-top: 12px;
    color: #d8c8e8;
  }

  .nav {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    font-size: .8rem;
    color: #7df9ff;
    text-transform: uppercase;
  }

  .reticle {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 14px;
    height: 14px;
    border: 1px solid #ff45e6;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    opacity: .6;
  }
</style>
</head>
<body>
  <main class="vision">
    <div class="world"></div>

    <section class="ui" id="ui">
      <article class="panel main">
        <div class="tag">NCN 2077 // Live Feed</div>
        <h1>Pacifica Unrest Continues</h1>
        <p>Clashes reported near Coastview. NCPD presence increased.</p>
      </article>

      <aside class="panel left">
        <h2>Weather</h2>
        <p>13°C<br>Rain / Overcast<br>Watson</p>
      </aside>

      <aside class="panel right">
        <h2>City Feed</h2>
        <p>18:39 Police activity<br>18:31 Arasaka alert<br>18:21 Traffic spike</p>
      </aside>

      <nav class="panel bottom">
        <div class="nav">
          <span>Top Stories</span>
          <span>Local</span>
          <span>World</span>
          <span>Business</span>
          <span>More</span>
        </div>
      </nav>
    </section>

    <div class="reticle"></div>
  </main>

<script>
  const ui = document.getElementById("ui");

  window.addEventListener("pointermove", (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 2;
    const y = (e.clientY / window.innerHeight - 0.5) * 2;

    ui.style.transform = `
      rotateY(${x * -10}deg)
      rotateX(${y * 5}deg)
      translateZ(20px)
    `;
  });
</script>
</body>
</html>
